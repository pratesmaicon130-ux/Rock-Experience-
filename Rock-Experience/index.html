<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Experience 🎸</title>
</head>
<body>
    <fieldset>
        <legend>Rock Experience 🎸</legend>
        
        <section>
        <div>
            <label for="nome">nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div>
            <label for="data">Ano de Estrada:</label>
            <input type="number" id="data" name="data" required min="0" max="80" value="0">
        </div>

        <div>
            <label for="primeiro-show">Data do Primeiro Show:</label>
            <input type="date" id="primeiro-show" name="primeiro-show">
        </div>

        <div>
            <label for="ultimo-show">Data do Último Show:</label>
            <input type="date" id="ultimo-show" name="ultimo-show">
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" pattern="[0-9] {11}" placeholder="11999998888">
        </div>

        <div>
            <label for="foto">Foto do Set/Instrumento</label>
            <input type="file" id="foto" name="foto" accept="image/*">
        </div>
           
        
        </section>
    </fieldset>
    
</body>
</html>
