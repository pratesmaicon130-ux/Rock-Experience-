<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Experience 🎸</title>
</head>
<body>
    <fieldset>
        <legend>Rock Experience 🎸</legend>
        
        <section>
        <div>
            <label for="nome">nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div>
            <label for="data">Ano de Estrada:</label>
            <input type="number" id="data" name="data" required min="0" max="80" value="0">
        </div>

        <div>
            <label for="primeiro-show">Data do Primeiro Show:</label>
            <input type="date" id="primeiro-show" name="primeiro-show">
        </div>

        <div>
            <label for="ultimo-show">Data do Último Show:</label>
            <input type="date" id="ultimo-show" name="ultimo-show">
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" pattern="[0-9] {11}" placeholder="11999998888">
        </div>

        <div>
            <label for="foto">Foto do Set/Instrumento</label>
            <input type="file" id="foto" name="foto" accept="image/*">
        </div>
           
        
        </section>
    </fieldset>

    <fieldset>
        <legend>Perfil Musical (Identidade)</legend>
        <section>
            <div>
                <p>Qual seu papel principal?</p>
                <div>
                <input type="radio" id="vocalista" name="papel" value="vocalista">
                <label for="vocalista">Vocalista</label>
                </div> 

                <div>
                <input type="radio" id="guitarrista" name="papel" value="guitarrista">   
                <label for="guitarrista">Guitarrista</label>
                </div>

                <div>
                <input type="radio" id="baixista" name="papel" value="baixista">
                <label for="baixista">Baixista</label>
                </div>

                <div>
                <input type="radio" id="baterista" name="papel" value="baterista">
                <label for="baterista">Baterista</label>
                </div>

                <div>
                <input type="radio" id="outro" name="papel" value="outro">
                <label for="outro">Outro</label><br>
                </div>
    
            </div>


                 <div>
        <label for="civil">Estado Civil:</label><br>
        <select id="civil" name="civil">
            <option value="">Selecione...</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="uniao">União Estável</option>
        </select>
    </div>

    <div>
        <label for="uf">Estados</label>
        <select id="uf" name="uf">
            <option value="">Selecione...</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <Option value="TO">Tocantins</Option>
        </select>
    </div>


    <div>
        <label for="cidadenatal">Cidade Natal:</label>
        <input type="text" id="cidadenatal" name="cidadenatal" required>
    </div>

  
    
        </section>
    </fieldset>


  
  
    
</body>
</html>
